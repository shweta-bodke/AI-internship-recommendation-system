<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-light">

  <div class="card shadow-lg border-0" 
       style="width: 430px; border-radius: 16px; overflow: hidden;">

    <!-- Government Header -->
    <div class="bg-primary text-white text-center py-4">

      <img 
        src="https://cdn-icons-png.flaticon.com/512/3062/3062634.png"
        width="75"
        class="mb-2">

      <h3 class="fw-bold mb-1">
        AI Internship Portal
      </h3>

      <p class="mb-0 small">
        Government Internship Scheme System
      </p>

    </div>

    <!-- Body -->
    <div class="card-body p-4">

      <div class="text-center mb-4">

        <h4 class="fw-bold text-dark">
          Candidate Login
        </h4>

        <p class="text-muted small">
          Access your internship dashboard securely
        </p>

      </div>

      <form>

        <!-- Email -->
        <div class="mb-3">

          <label class="form-label fw-semibold">
            Registered Email
          </label>

          <div class="input-group">

            <span class="input-group-text bg-white">
              <i class="fas fa-envelope text-primary"></i>
            </span>

            <input
              type="email"
              class="form-control"
              placeholder="Enter your email">

          </div>

        </div>

        <!-- Password -->
        <div class="mb-3">

          <label class="form-label fw-semibold">
            Password
          </label>

          <div class="input-group">

            <span class="input-group-text bg-white">
              <i class="fas fa-lock text-primary"></i>
            </span>

            <input
              type="password"
              class="form-control"
              placeholder="Enter your password">

          </div>

        </div>

        <!-- Remember + Forgot -->
        <div class="d-flex justify-content-between align-items-center mb-4">

          <div class="form-check">

            <input class="form-check-input" type="checkbox">

            <label class="form-check-label small">
              Remember Me
            </label>

          </div>

          <a href="#" class="small text-decoration-none">
            Forgot Password?
          </a>

        </div>

        <a
  routerLink="/profile"
  class="btn btn-primary w-100">

  Login

</a>

      </form>

      <!-- Divider -->
      <div class="text-center my-4">

        <span class="text-muted small">
          OR
        </span>

      </div>

      <!-- Signup -->
      <a href="#"
         class="btn btn-outline-primary w-100 fw-semibold">

         <i class="fas fa-user-plus me-2"></i>
         New Candidate Registration

      </a>

    </div>

    <!-- Footer -->
    <div class="bg-light text-center py-3 border-top">

      <small class="text-muted">
        © 2026 Government Internship & Skill Development Portal
      </small>

    </div>

  </div>

</div>
